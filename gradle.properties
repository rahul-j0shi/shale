# Toolchains are pinned to the in-repo JDK 25 (.tools/jdk-25), surfaced to Gradle via
# JAVA_HOME by `source scripts/env.sh`. Auto-download is off: the toolchain is the one
# vendored in the repo, never fetched from the network behind your back.
org.gradle.java.installations.auto-download=false

# Faster local builds; both are safe for this project's module graph.
org.gradle.parallel=true
org.gradle.caching=true
